<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>minimal-x</title>
  <style>
    :root { color-scheme: light dark; }
    body {
      margin: 0;
      padding: 16px;
      width: 320px;
      font: 14px/1.4 system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: Canvas;
      color: CanvasText;
    }
    h1 {
      margin: 0 0 8px;
      font-size: 18px;
    }
    p {
      margin: 0 0 14px;
      color: GrayText;
    }
    .panel {
      border: 1px solid color-mix(in srgb, CanvasText 12%, transparent);
      border-radius: 12px;
      padding: 12px;
      margin-bottom: 12px;
    }
    .row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 12px;
    }
    .row:last-child { margin-bottom: 0; }
    .label {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }
    .label strong { font-size: 14px; }
    .label span { font-size: 12px; color: GrayText; }
    .segmented {
      display: flex;
      gap: 8px;
    }
    button,
    .toggle {
      border: 1px solid color-mix(in srgb, CanvasText 16%, transparent);
      border-radius: 10px;
      background: transparent;
      color: inherit;
      padding: 10px 12px;
      cursor: pointer;
      font: inherit;
    }
    button.primary {
      width: 100%;
      background: #1d9bf0;
      border-color: #1d9bf0;
      color: white;
      font-weight: 600;
    }
    .toggle[aria-pressed="true"] {
      background: #1d9bf0;
      color: white;
      border-color: #1d9bf0;
    }
    .status {
      margin-top: 10px;
      min-height: 18px;
      font-size: 12px;
      color: GrayText;
    }
  </style>
</head>
<body>
  <h1>minimal-x</h1>
  <p>Only keep X built-in Articles visible.</p>

  <div class="panel">
    <div class="row">
      <div class="label">
        <strong>Filtering</strong>
        <span>Turn article-only mode on or off.</span>
      </div>
      <button id="enabledButton" class="toggle" type="button" aria-pressed="true">On</button>
    </div>

    <div class="row">
      <div class="label">
        <strong>Non-article posts</strong>
        <span>Choose how filtered posts should appear.</span>
      </div>
      <div class="segmented">
        <button id="hideMode" class="toggle" type="button" aria-pressed="true">Hide</button>
        <button id="collapseMode" class="toggle" type="button" aria-pressed="false">Collapse</button>
      </div>
    </div>
  </div>

  <button id="showAllButton" type="button">Show all on this page</button>
  <button id="saveButton" class="primary" type="button" style="margin-top:10px;">Save settings</button>
  <div id="status" class="status" aria-live="polite"></div>

  <script src="src/shared/storage.js"></script>
  <script src="src/popup/popup.js"></script>
</body>
</html>
