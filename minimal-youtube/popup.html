<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>minimal-youtube</title>
  <style>
    :root {
      color-scheme: light dark;
      --border: color-mix(in srgb, CanvasText 12%, transparent);
      --border-strong: color-mix(in srgb, CanvasText 18%, transparent);
      --muted: color-mix(in srgb, CanvasText 58%, transparent);
      --surface: color-mix(in srgb, Canvas 92%, transparent);
      --surface-2: color-mix(in srgb, CanvasText 4%, Canvas);
      --accent: #ff0033;
      --accent-soft: color-mix(in srgb, var(--accent) 10%, Canvas);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      width: 336px;
      padding: 14px;
      font: 13px/1.45 ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: Canvas;
      color: CanvasText;
    }

    .shell {
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 14px;
      background: linear-gradient(
        180deg,
        color-mix(in srgb, Canvas 96%, transparent),
        color-mix(in srgb, CanvasText 2%, Canvas)
      );
    }

    .brand {
      margin: 0 0 14px;
      padding: 12px;
      border: 1px solid var(--border);
      border-radius: 14px;
      background: var(--surface);
    }

    .ascii {
      margin: 0 0 10px;
      white-space: pre;
      overflow: hidden;
      font: 11px/1.2 ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      color: color-mix(in srgb, CanvasText 84%, transparent);
    }

    h1 {
      margin: 0;
      font-size: 14px;
      font-weight: 600;
      letter-spacing: 0.02em;
    }

    .subtext {
      margin: 6px 0 0;
      color: var(--muted);
      font-size: 12px;
    }

    .panel {
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 12px;
      background: var(--surface-2);
    }

    .row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .eyebrow {
      margin: 0 0 4px;
      font-size: 11px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .label {
      margin: 0;
      font-size: 13px;
      font-weight: 600;
    }

    .hint {
      margin: 4px 0 0;
      color: var(--muted);
      font-size: 12px;
    }

    button {
      appearance: none;
      border: 1px solid var(--border-strong);
      border-radius: 999px;
      background: transparent;
      color: inherit;
      padding: 10px 12px;
      cursor: pointer;
      font: inherit;
      transition: background 140ms ease, border-color 140ms ease, color 140ms ease, transform 140ms ease;
    }

    button:hover {
      transform: translateY(-1px);
    }

    .toggle {
      min-width: 58px;
      font-weight: 600;
    }

    .toggle[aria-pressed="true"] {
      background: var(--accent);
      border-color: var(--accent);
      color: white;
    }

    .stack {
      display: grid;
      gap: 10px;
      margin-top: 12px;
    }

    .ghost,
    .primary {
      width: 100%;
      border-radius: 12px;
    }

    .ghost {
      background: transparent;
    }

    .primary {
      background: var(--accent-soft);
      border-color: color-mix(in srgb, var(--accent) 22%, transparent);
      font-weight: 600;
    }

    .status {
      margin-top: 10px;
      min-height: 16px;
      color: var(--muted);
      font-size: 12px;
    }
  </style>
</head>
<body>
  <main class="shell">
    <section class="brand" aria-label="minimal-youtube brand">
      <pre class="ascii">┌──────────────────────┐
│  minimal.youtube    │
│  home + shorts off  │
└──────────────────────┘</pre>
      <h1>minimal-youtube</h1>
      <p class="subtext">A quieter front page. Less bait, more intent.</p>
    </section>

    <section class="panel">
      <div class="row">
        <div>
          <p class="eyebrow">State</p>
          <p class="label">Filtering</p>
          <p class="hint">Blocks Home and Shorts.</p>
        </div>
        <button id="enabledButton" class="toggle" type="button" aria-pressed="true">On</button>
      </div>
    </section>

    <div class="stack">
      <button id="showAllButton" class="ghost" type="button">Show everything on this page</button>
      <button id="saveButton" class="primary" type="button">Save settings</button>
    </div>
    <div id="status" class="status" aria-live="polite"></div>
  </main>

  <script src="src/shared/storage.js"></script>
  <script src="src/popup/popup.js"></script>
</body>
</html>
